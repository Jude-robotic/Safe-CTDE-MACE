seed: 7

environment:
  grid_size: [10, 10, 4]
  voxel_resolution: 1.0
  num_uavs: 2
  sensor_range: 2.5
  comm_range: 8.0
  safe_obs_dist: 1.0
  safe_agent_dist: 1.5
  max_velocity: 1.0
  max_acceleration: 1.0
  max_steps: 80
  target_coverage_ratio: 0.90
  local_patch_radius: 3
  num_frontier_candidates: 5
  reservation_radius: 1
  astar_connectivity: 6
  planner_type: astar
  trajectory_sample_dt: 0.5
  trajectory_execution_dt: 1.0
  ego_optimize_iterations: 30
  ego_smooth_weight: 0.35
  ego_obstacle_weight: 0.8
  ego_seed_connectivity: 26
  max_neighbors: 1
  initial_positions:
    - [1, 1, 1]
    - [8, 8, 1]
  obstacle_generation:
    random_boxes: 2
    min_box_size: [1, 1, 1]
    max_box_size: [2, 2, 2]
    manual_boxes: []

reward:
  w_new: 1.0
  w_info: 0.5
  w_repeat: 0.3
  w_overlap: 0.5
  w_collision: 10.0
  w_obstacle: 10.0
  w_time: 0.01
  w_energy: 0.05
  w_reserve: 0.5
  w_finish: 50.0

training:
  device: auto
  num_envs: 1
  learning_rate: 0.001
  gamma: 0.99
  batch_size: 16
  replay_capacity: 5000
  warmup_steps: 16
  target_update_interval: 50
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 1000
  hidden_dim: 64
  num_episodes: 30
  save_interval: 5
  checkpoint_dir: checkpoints
  log_dir: logs
